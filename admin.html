<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FootCamp Dreams - Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="assets/admin.js"></script>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand">FootCamp Dreams - Administration</span>
    </div>
  </nav>

  <header class="bg-success text-white py-4 mb-4">
    <div class="container">
      <h1>Espace administrateur</h1>
      <p class="mb-0">Validation des réservations, arrhes, réductions et activités</p>
    </div>
  </header>

  <main class="container">
    <div class="row g-4">
      <div class="col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h5 mb-3">Connexion admin</h2>

            <form id="adminLoginForm">
              <div class="mb-3">
                <label for="admin_email" class="form-label">Email</label>
                <input type="email" id="admin_email" class="form-control" required>
              </div>

              <div class="mb-3">
                <label for="admin_password" class="form-label">Mot de passe</label>
                <input type="password" id="admin_password" class="form-control" required>
              </div>

              <button type="submit" class="btn btn-dark">Se connecter</button>
            </form>

            <div id="adminLoginMessage" class="mt-3"></div>
          </div>
        </div>

        <div class="card shadow-sm mt-4">
          <div class="card-body">
            <h2 class="h5 mb-3">Demandes d’un jour</h2>

            <div class="mb-3">
              <label for="dayFilter" class="form-label">Jour</label>
              <input type="date" id="dayFilter" class="form-control">
            </div>

            <button type="button" id="btnLoadDay" class="btn btn-outline-primary">Afficher</button>

            <div id="dayRequestsBox" class="mt-3"></div>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <h2 class="h5 mb-3">Liste des réservations</h2>
            <div id="reservationsBox"></div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h5 mb-3">Planifier une activité</h2>

            <form id="planActivityForm">
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="reservation_id" class="form-label">ID réservation</label>
                  <input type="number" id="reservation_id" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label for="activity_day" class="form-label">Jour</label>
                  <input type="date" id="activity_day" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label for="activity_name" class="form-label">Activité</label>
                  <input type="text" id="activity_name" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label for="coach" class="form-label">Animateur / Coach</label>
                  <input type="text" id="coach" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label for="referee" class="form-label">Arbitre</label>
                  <input type="text" id="referee" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label for="participants" class="form-label">Participants</label>
                  <input type="number" id="participants" class="form-control" min="1" required>
                </div>

                <div class="col-12">
                  <button type="submit" class="btn btn-success">Valider l’activité</button>
                </div>
              </div>
            </form>

            <div id="planActivityMessage" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
