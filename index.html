<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FootCamp Dreams - Client</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="assets/client.js"></script>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand">FootCamp Dreams</span>
    </div>
  </nav>

  <header class="bg-primary text-white py-4 mb-4">
    <div class="container">
      <h1>Centre de vacances Football</h1>
      <p class="mb-0">Réservation, activités et prestations</p>
    </div>
  </header>

  <main class="container">
    <div class="row g-4">
      <div class="col-lg-7">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h4 mb-3">Demande de réservation</h2>

            <form id="reservationForm">
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="nom" class="form-label">Nom</label>
                  <input type="text" id="nom" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label for="prenom" class="form-label">Prénom</label>
                  <input type="text" id="prenom" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label for="email" class="form-label">Email</label>
                  <input type="email" id="email" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label for="telephone" class="form-label">Téléphone</label>
                  <input type="text" id="telephone" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label for="date_arrivee" class="form-label">Date d'arrivée</label>
                  <input type="date" id="date_arrivee" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label for="date_depart" class="form-label">Date de départ</label>
                  <input type="date" id="date_depart" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label for="nb_personnes" class="form-label">Nombre de personnes</label>
                  <input type="number" id="nb_personnes" class="form-control" min="1" required>
                </div>

                <div class="col-12">
                  <label class="form-label">Activités demandées</label>
                  <div id="activitiesBox" class="border rounded p-3 bg-light">
                    <div class="form-check">
                      <input class="form-check-input activity-checkbox" type="checkbox" value="Entrainement collectif" id="act1">
                      <label class="form-check-label" for="act1">Entrainement collectif</label>
                    </div>

                    <div class="form-check">
                      <input class="form-check-input activity-checkbox" type="checkbox" value="Match amical" id="act2">
                      <label class="form-check-label" for="act2">Match amical</label>
                    </div>

                    <div class="form-check">
                      <input class="form-check-input activity-checkbox" type="checkbox" value="Atelier tirs au but" id="act3">
                      <label class="form-check-label" for="act3">Atelier tirs au but</label>
                    </div>

                    <div class="form-check">
                      <input class="form-check-input activity-checkbox" type="checkbox" value="Analyse video" id="act4">
                      <label class="form-check-label" for="act4">Analyse video</label>
                    </div>
                  </div>
                </div>

                <div class="col-12 d-flex gap-2 flex-wrap">
                  <button type="submit" class="btn btn-success">Envoyer la réservation</button>
                  <button type="button" class="btn btn-outline-primary" id="btnInvoice">Voir la facture</button>
                </div>
              </div>
            </form>

            <div id="reservationMessage" class="mt-3"></div>
            <div id="invoiceBox" class="mt-3"></div>
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <h2 class="h5 mb-3">Connexion client</h2>

            <form id="loginForm">
              <div class="mb-3">
                <label for="login_email" class="form-label">Email</label>
                <input type="email" id="login_email" class="form-control" required>
              </div>

              <div class="mb-3">
                <label for="login_password" class="form-label">Mot de passe</label>
                <input type="password" id="login_password" class="form-control" required>
              </div>

              <button type="submit" class="btn btn-dark">Se connecter</button>
            </form>

            <div id="loginMessage" class="mt-3"></div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h5 mb-3">Ajouter une prestation</h2>

            <form id="serviceForm">
              <div class="mb-3">
                <label for="service_email" class="form-label">Email du client</label>
                <input type="email" id="service_email" class="form-control" required>
              </div>

              <div class="mb-3">
                <label for="service_name" class="form-label">Prestation</label>
                <select id="service_name" class="form-select">
                  <option value="Repas VIP">Repas VIP</option>
                  <option value="Maillot personnalise">Maillot personnalise</option>
                  <option value="Transport stade">Transport stade</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="quantity" class="form-label">Quantité</label>
                <input type="number" id="quantity" class="form-control" min="1" value="1" required>
              </div>

              <button type="submit" class="btn btn-primary">Ajouter la prestation</button>
            </form>

            <div id="serviceMessage" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
